<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>دليل المصادر الأكاديمية المحدث</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Amiri:wght@400;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
<style>
  :root {
    --blue: #1a4f8a;
    --blue-mid: #2563a8;
    --blue-light: #deeaf8;
    --white: #ffffff;
    --text: #1c1f2a;
    --text-muted: #6b7280;
    --slate-border: #e2e4ea;
    --radius: 14px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Amiri', serif; background: #f7f8fc; color: var(--text); line-height: 1.6; }
  body.ltr { font-family: 'DM Sans', sans-serif; direction: ltr; }

  /* Header Section */
  .site-header {
    background: linear-gradient(135deg, #0f3460 0%, #1a4f8a 100%);
    padding: 3rem 1rem 5rem;
    color: white;
    text-align: center;
    clip-path: ellipse(150% 100% at 50% 0%);
  }

  .hero-title { font-size: 2.5rem; margin-bottom: 1rem; }
  .search-wrap { max-width: 600px; margin: 2rem auto; position: relative; }
  .search-input {
    width: 100%; padding: 15px 25px; border-radius: 30px; border: none;
    font-size: 1rem; outline: none; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
  }

  /* Main Content */
  .main { max-width: 1100px; margin: -3rem auto 4rem; padding: 0 1.5rem; }
  
  .tabs-row { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 2rem; justify-content: center; }
  .tab-btn {
    padding: 10px 20px; border-radius: 25px; border: 1px solid var(--slate-border);
    background: white; cursor: pointer; transition: 0.3s; font-family: inherit;
  }
  .tab-btn.active { background: var(--blue); color: white; border-color: var(--blue); }

  .cards-grid {
    display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
  }

  .res-card {
    background: white; border-radius: var(--radius); padding: 1.5rem;
    border: 1px solid var(--slate-border); transition: 0.3s;
    display: flex; flex-direction: column; text-decoration: none; color: inherit;
  }
  .res-card:hover { transform: translateY(-5px); box-shadow: 0 15px 35px rgba(0,0,0,0.1); border-color: var(--blue); }

  .card-icon { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 1rem; }
  .card-name { font-size: 1.2rem; font-weight: bold; margin-bottom: 0.5rem; color: var(--blue); }
  .card-desc { font-size: 0.95rem; color: var(--text-muted); flex-grow: 1; margin-bottom: 1.5rem; }

  .visit-btn {
    display: inline-block; text-align: center; background: var(--blue); color: white;
    padding: 10px; border-radius: 8px; text-decoration: none; font-weight: bold; transition: 0.3s;
  }
  .visit-btn:hover { background: #0f3460; }

  .lang-toggle {
    position: absolute; top: 20px; left: 20px;
    background: rgba(255,255,255,0.2); color: white; border: 1px solid white;
    padding: 5px 15px; border-radius: 20px; cursor: pointer;
  }
</style>
</head>
<body>

<button class="lang-toggle" onclick="toggleLang()" id="lang-btn">English</button>

<header class="site-header">
  <h1 class="hero-title" id="h-title">دليل المصادر الأكاديمية</h1>
  <p id="h-sub">قواعد بيانات وأدوات موثوقة للباحثين والطلاب</p>
  <div class="search-wrap">
    <input class="search-input" id="search-input" placeholder="ابحث عن مصدر..." oninput="filterResources()"/>
  </div>
</header>

<main class="main">
  <div class="tabs-row" id="tabs-row">
    <button class="tab-btn active" data-cat="all" onclick="setTab(this)">الكل</button>
    <button class="tab-btn" data-cat="students" onclick="setTab(this)">طلاب</button>
    <button class="tab-btn" data-cat="researchers" onclick="setTab(this)">باحثون</button>
  </div>

  <div class="cards-grid" id="cards-grid">
    </div>
</main>

<script>
// البيانات المحدثة مع إضافة بريتانيكا
const DATA = [
  { id: 1, en: { name: "Google Scholar", desc: "Search scholarly literature across many disciplines." }, ar: { name: "جوجل سكولار", desc: "البحث في الأبحاث الأكاديمية والمقالات العلمية." }, icon: "🎓", cat: ["students", "researchers"], url: "https://scholar.google.com" },
  { id: 2, en: { name: "JSTOR", desc: "A digital library of academic journals and books." }, ar: { name: "جيستور", desc: "مكتبة رقمية للمجلات الأكاديمية والكتب." }, icon: "📚", cat: ["researchers"], url: "https://www.jstor.org" },
  { id: 3, en: { name: "Britannica", desc: "Trusted online encyclopedia with verified information." }, ar: { name: "موسوعة بريتانيكا", desc: "موسوعة إلكترونية موثوقة تحتوي على معلومات محققة." }, icon: "🌍", cat: ["students", "researchers"], url: "https://www.britannica.com" },
  { id: 4, en: { name: "PubMed", desc: "Database for biomedical and life sciences literature." }, ar: { name: "بابميد", desc: "قاعدة بيانات لأبحاث الطب وعلوم الحياة." }, icon: "🧬", cat: ["researchers"], url: "https://pubmed.ncbi.nlm.nih.gov" },
  { id: 5, en: { name: "World Bank Data", desc: "Free access to global development data." }, ar: { name: "بيانات البنك الدولي", desc: "وصول مجاني لبيانات التنمية العالمية." }, icon: "📊", cat: ["researchers"], url: "https://data.worldbank.org" }
];

let currentLang = 'ar';
let currentCat = 'all';

function toggleLang() {
  currentLang = currentLang === 'ar' ? 'en' : 'ar';
  document.body.className = currentLang === 'en' ? 'ltr' : '';
  document.getElementById('lang-btn').textContent = currentLang === 'ar' ? 'English' : 'العربية';
  document.getElementById('h-title').textContent = currentLang === 'ar' ? 'دليل المصادر الأكاديمية' : 'Academic Resources Directory';
  document.getElementById('search-input').placeholder = currentLang === 'ar' ? 'ابحث عن مصدر...' : 'Search resources...';
  render();
}

function setTab(btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentCat = btn.dataset.cat;
  render();
}

function filterResources() {
  render();
}

function render() {
  const query = document.getElementById('search-input').value.toLowerCase();
  const grid = document.getElementById('cards-grid');
  grid.innerHTML = '';

  const filtered = DATA.filter(item => {
    const content = (item[currentLang].name + item[currentLang].desc).toLowerCase();
    const matchCat = currentCat === 'all' || item.cat.includes(currentCat);
    const matchSearch = content.includes(query);
    return matchCat && matchSearch;
  });

  filtered.forEach(item => {
    const card = document.createElement('div');
    card.className = 'res-card';
    card.innerHTML = `
      <div class="card-icon" style="background:#f0f6ff">${item.icon}</div>
      <div class="card-name">${item[currentLang].name}</div>
      <p class="card-desc">${item[currentLang].desc}</p>
      <a href="${item.url}" target="_blank" rel="noopener" class="visit-btn">
        ${currentLang === 'ar' ? 'زيارة الموقع' : 'Visit Website'}
      </a>
    `;
    grid.appendChild(card);
  });
}

// التشغيل لأول مرة
render();
</script>
</body>
</html>
