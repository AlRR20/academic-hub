<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>المكتبة الأكاديمية الشاملة | Academic Hub</title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #1a4f8a;
            --accent: #c8873a;
            --bg: #f4f7fa;
            --text: #2d3436;
            --white: #ffffff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Amiri', serif; background: var(--bg); color: var(--text); transition: 0.3s; }
        body.en { font-family: 'Inter', sans-serif; direction: ltr; }

        /* Header */
        header {
            background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
            color: white;
            padding: 3rem 1rem;
            text-align: center;
            position: relative;
        }

        .lang-btn {
            position: absolute; top: 20px; left: 20px;
            padding: 8px 16px; border-radius: 20px; border: 1px solid white;
            background: rgba(255,255,255,0.1); color: white; cursor: pointer;
        }
        body.en .lang-btn { left: auto; right: 20px; }

        .search-box {
            max-width: 700px; margin: 2rem auto -4.5rem;
            background: var(--white); padding: 10px; border-radius: 50px;
            display: flex; box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .search-box input {
            width: 100%; border: none; padding: 12px 20px; outline: none;
            font-size: 1rem; border-radius: 50px; font-family: inherit;
        }

        /* Categories */
        .categories {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 10px; margin-top: 6rem; padding: 0 1rem;
        }

        .cat-btn {
            padding: 8px 18px; border-radius: 20px; border: 1px solid #d1d5db;
            background: white; cursor: pointer; transition: 0.3s; font-family: inherit;
        }

        .cat-btn.active { background: var(--primary); color: white; border-color: var(--primary); }

        /* Grid */
        .container { max-width: 1200px; margin: 2rem auto; padding: 0 1rem; }
        .grid {
            display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .card {
            background: white; padding: 1.5rem; border-radius: 15px;
            border: 1px solid #e5e7eb; transition: 0.3s; display: flex; flex-direction: column;
        }

        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.05); }
        .card-icon { font-size: 2rem; margin-bottom: 1rem; }
        .card-title { font-size: 1.25rem; font-weight: bold; color: var(--primary); margin-bottom: 0.5rem; }
        .card-desc { font-size: 0.95rem; color: #636e72; flex-grow: 1; margin-bottom: 1.5rem; }
        
        .visit-btn {
            display: block; text-align: center; background: var(--primary);
            color: white; text-decoration: none; padding: 10px; border-radius: 8px;
            font-weight: bold; transition: 0.3s;
        }
        .visit-btn:hover { background: #093366; }

        footer { text-align: center; padding: 4rem 1rem; color: #636e72; font-size: 0.9rem; }
    </style>
</head>
<body>

<header>
    <button class="lang-btn" onclick="toggleLang()" id="langSwitcher">English</button>
    <h1 id="title">المكتبة الأكاديمية والمصادر البحثية</h1>
    <p id="subtitle" style="margin-top:10px; opacity:0.9">بوابة شاملة للطلاب والمحاضرين والمهندسين</p>
    <div class="search-box">
        <input type="text" id="searchInput" placeholder="ابحث عن مصدر أو تخصص..." oninput="render()">
    </div>
</header>

<div class="container">
    <div class="categories" id="catList">
        </div>

    <div class="grid" id="mainGrid">
        </div>
</div>

<footer id="footer">
    &copy; 2024 جميع المصادر مفهرسة وموثوقة لخدمة البحث العلمي
</footer>

<script>
const resources = [
    // 1. مشاريع الدول والجغرافيا
    { id: 1, icon: "🗺️", cat: "geo", url: "https://www.britannica.com", ar: { name: "موسوعة بريتانيكا", desc: "موسوعة شاملة توفر معلومات محققة لجميع التخصصات." }, en: { name: "Britannica", desc: "A comprehensive encyclopedia for verified info." } },
    { id: 2, icon: "📖", cat: "geo", url: "https://www.cia.gov/the-world-factbook/", ar: { name: "كتاب حقائق العالم", desc: "الأفضل لمشاريع تعريف الدول والخرائط والإحصائيات السكانية." }, en: { name: "The World Factbook", desc: "Best for country profiles, maps, and demographics." } },
    { id: 3, icon: "📈", cat: "geo", url: "https://data.worldbank.org", ar: { name: "بيانات البنك الدولي", desc: "رسوم بيانية للمقارنة بين الدول في الصحة والتعليم والاقتصاد." }, en: { name: "World Bank Data", desc: "Global development data, health, and education charts." } },
    { id: 4, icon: "🇺🇳", cat: "geo", url: "https://data.un.org", ar: { name: "بيانات الأمم المتحدة", desc: "ممتاز لمشاريع التنمية المستدامة والقضايا العالمية." }, en: { name: "UN Data", desc: "Great for sustainable development and global issues." } },
    
    // 2. العلوم والبيئة
    { id: 5, icon: "🚀", cat: "sci", url: "https://www.nasa.gov/solve/", ar: { name: "ناسا - ناسا سولف", desc: "تحديات ومشاريع تفاعلية ومصادر بيانات فضائية حقيقية." }, en: { name: "NASA Solve", desc: "Interactive challenges and real space/climate data." } },
    { id: 6, icon: "🧪", cat: "sci", url: "https://www.science.gov", ar: { name: "بوابة العلوم", desc: "محرك بحث للأبحاث العلمية الموثوقة الممولة حكومياً." }, en: { name: "Science.gov", desc: "Search engine for government-funded scientific research." } },
    { id: 7, icon: "🌡️", cat: "sci", url: "https://www.climate.gov", ar: { name: "بوابة المناخ", desc: "مثالي لمشاريع الاحتباس الحراري وتغير المناخ." }, en: { name: "Climate.gov", desc: "Ideal for global warming and climate change projects." } },
    
    // 3. الصحة والطب
    { id: 8, icon: "🧬", cat: "health", url: "https://www.ncbi.nlm.nih.gov/pmc/", ar: { name: "ببمد سنترال", desc: "ملايين المقالات والأبحاث الطبية الكاملة مجاناً." }, en: { name: "PubMed Central", desc: "Millions of free, full-text medical research articles." } },
    { id: 9, icon: "🏥", cat: "health", url: "https://medlineplus.gov", ar: { name: "ميدلاين بلس", desc: "معلومات طبية مبسطة للمنشورات التوعوية والمشاريع." }, en: { name: "MedlinePlus", desc: "Simplified medical info for awareness and student projects." } },
    
    // 4. الاقتصاد والإدارة
    { id: 10, icon: "💼", cat: "eco", url: "https://www.bls.gov", ar: { name: "مكتب إحصاءات العمل", desc: "دراسة سوق العمل، المهن الأكثر طلباً والرواتب." }, en: { name: "Bureau of Labor Statistics", desc: "Career planning and labor market statistics." } },
    { id: 11, icon: "💵", cat: "eco", url: "https://fred.stlouisfed.org", ar: { name: "بيانات FRED", desc: "سلاسل زمنية وأرقام تضخم وأسعار عملات لمشاريع الاقتصاد." }, en: { name: "FRED Data", desc: "Economic time series and inflation data for researchers." } },
    
    // 5. التاريخ والأدب
    { id: 12, icon: "🏛️", cat: "hist", url: "https://www.loc.gov", ar: { name: "مكتبة الكونجرس", desc: "صور تاريخية، تسجيلات وخرائط قديمة تعطي قيمة لمشروعك." }, en: { name: "Library of Congress", desc: "Primary sources, historical photos, and old maps." } },
    { id: 13, icon: "📜", cat: "hist", url: "https://www.archives.gov", ar: { name: "الأرشيف الوطني", desc: "الوصول إلى الوثائق الرسمية والخطابات التاريخية الشهيرة." }, en: { name: "National Archives", desc: "Access to official documents and historical speeches." } },
    
    // 6. أدوات البحث الشاملة
    { id: 14, icon: "🎓", cat: "search", url: "https://scholar.google.com", ar: { name: "باحث جوجل", desc: "المحرك الأهم للبحث عن المراجع والكتب الأكاديمية." }, en: { name: "Google Scholar", desc: "The go-to engine for scholarly literature and books." } },
    { id: 15, icon: "🏫", cat: "search", url: "https://eric.ed.gov", ar: { name: "مركز ERIC", desc: "مصدر رئيسي لمشاريع التعليم وعلم النفس التربوي." }, en: { name: "ERIC", desc: "Key source for education and psychology research." } },
    
    // 7. المنصات الهندسية التقنية
    { id: 16, icon: "🛠️", cat: "eng", url: "https://www.nist.gov", ar: { name: "معهد NIST", desc: "المرجع العالمي للمقاييس، أبحاث المواد والأمن السيبراني." }, en: { name: "NIST", desc: "World standards for materials, cybersecurity, and tech." } },
    { id: 17, icon: "🏗️", cat: "eng", url: "https://www.nae.edu", ar: { name: "الأكاديمية الوطنية للهندسة", desc: "تقارير حول التحديات الهندسية الكبرى لإلهام مشاريع التخرج." }, en: { name: "NAE", desc: "Engineering challenges reports for capstone inspiration." } },
    { id: 18, icon: "🛩️", cat: "eng", url: "https://ntrs.nasa.gov", ar: { name: "مستودع أبحاث ناسا (NTRS)", desc: "أبحاث في الديناميكا الحرارية وهندسة النظم والمواد." }, en: { name: "NASA Technical Reports", desc: "Research in thermodynamics and systems engineering." } },
    { id: 19, icon: "💡", cat: "eng", url: "https://www.uspto.gov", ar: { name: "مكتب براءات الاختراع", desc: "كنز للبحث عن براءات الاختراع والحلول التقنية الموجودة." }, en: { name: "USPTO", desc: "Search patents to find and develop technical solutions." } },
    { id: 20, icon: "🤖", cat: "eng", url: "https://discover.dtic.mil", ar: { name: "مركز DTIC", desc: "أبحاث متطورة في الروبوتات والذكاء الاصطناعي." }, en: { name: "DTIC", desc: "Advanced research in robotics and AI." } }
];

const cats = {
    all: { ar: "الكل", en: "All" },
    geo: { ar: "دول وجغرافيا", en: "Countries & Geo" },
    sci: { ar: "علوم وبيئة", en: "Science & Env" },
    health: { ar: "صحة وطب", en: "Health & Med" },
    eco: { ar: "اقتصاد وإدارة", en: "Economics" },
    hist: { ar: "تاريخ وفنون", en: "History & Arts" },
    search: { ar: "أدوات بحث", en: "Search Tools" },
    eng: { ar: "هندسة وتقنية", en: "Engineering" }
};

let lang = 'ar';
let activeCat = 'all';

function toggleLang() {
    lang = lang === 'ar' ? 'en' : 'ar';
    document.body.className = lang;
    document.getElementById('langSwitcher').innerText = lang === 'ar' ? 'English' : 'العربية';
    document.getElementById('title').innerText = lang === 'ar' ? 'المكتبة الأكاديمية والمصادر البحثية' : 'Academic Hub & Research Resources';
    document.getElementById('searchInput').placeholder = lang === 'ar' ? 'ابحث عن مصدر أو تخصص...' : 'Search for resources...';
    render();
}

function render() {
    const grid = document.getElementById('mainGrid');
    const catList = document.getElementById('catList');
    const query = document.getElementById('searchInput').value.toLowerCase();
    
    // Render Categories
    catList.innerHTML = Object.keys(cats).map(key => `
        <button class="cat-btn ${activeCat === key ? 'active' : ''}" onclick="filter('${key}')">
            ${cats[key][lang]}
        </button>
    `).join('');

    // Render Resources
    const filtered = resources.filter(r => {
        const matchCat = activeCat === 'all' || r.cat === activeCat;
        const matchSearch = r[lang].name.toLowerCase().includes(query) || r[lang].desc.toLowerCase().includes(query);
        return matchCat && matchSearch;
    });

    grid.innerHTML = filtered.map(r => `
        <div class="card">
            <div class="card-icon">${r.icon}</div>
            <div class="card-title">${r[lang].name}</div>
            <p class="card-desc">${r[lang].desc}</p>
            <a href="${r.url}" target="_blank" class="visit-btn">${lang === 'ar' ? 'زيارة الموقع' : 'Visit Site'}</a>
        </div>
    `).join('');
}

function filter(key) {
    activeCat = key;
    render();
}

render();
</script>

</body>
</html>
